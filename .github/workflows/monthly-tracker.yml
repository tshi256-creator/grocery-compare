name: Monthly Price Tracker

# Runs once a month and appends real SerpApi results to history-price.json.
# Needs a repository secret named SERPAPI_KEY (Settings -> Secrets and
# variables -> Actions -> New repository secret). Without that secret the
# job will fail fast with a clear error instead of silently writing nothing.

on:
  schedule:
    # 09:00 UTC on the 1st of every month
    - cron: "0 9 1 * *"
  workflow_dispatch: {} # allows manually triggering a run from the Actions tab

permissions:
  contents: write

jobs:
  track-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch this month's prices from SerpApi
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: node scripts/fetch-prices.js

      - name: Commit updated history-price.json
        run: |
          git config user.name "tally-bot"
          git config user.email "tally-bot@users.noreply.github.com"
          git add history-price.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: monthly price history update ($(date +'%Y-%m'))"
            git push
          fi
